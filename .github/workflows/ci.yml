name: CI

on:
  push:
    branches: [develop]

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_sqlite, sqlite3, mbstring, xml, ctype, json, bcmath
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.json') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run PHPUnit tests
        run: php artisan test

      - name: Validate OpenAPI documentation
        run: |
          php artisan docs:generate --fresh
          test -s storage/api-docs/api-docs.json
          php -r '
            $spec = json_decode(file_get_contents("storage/api-docs/api-docs.json"), true);
            if (!is_array($spec) || empty($spec["openapi"]) || empty($spec["paths"])) {
              fwrite(STDERR, "OpenAPI spec is invalid or empty\n");
              exit(1);
            }
          '

  merge-and-tag:
    name: Merge → main & Tag v1
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "alireza javadi"
          git config user.email "alirezajavadigit@gmail.com"

      - name: Merge develop into main
        run: |
          git checkout main
          git merge origin/develop --no-ff -m "chore: merge develop into main [ci]"
          git push origin main

      - name: Create v1 tag (once)
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v1$"; then
            echo "Tag v1 already exists, skipping."
          else
            git tag v1
            git push origin v1
          fi
