display_errors       = On
display_startup_errors = On
error_reporting      = E_ALL
log_errors           = On
error_log            = /var/log/php_errors.log

memory_limit         = 512M
upload_max_filesize  = 100M
post_max_size        = 100M
max_execution_time   = 300
max_input_time       = 300

date.timezone        = UTC

session.gc_maxlifetime = 7200

realpath_cache_size  = 4096k
realpath_cache_ttl   = 600
